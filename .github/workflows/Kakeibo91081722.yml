name: .NET Core アプリケーションを関数アプリ Kakeibo91081722 にビルドしてデプロイする
on:
  push:
    branches:
    - main
env:
  AZURE_FUNCTIONAPP_NAME: Kakeibo91081722
  AZURE_FUNCTIONAPP_PACKAGE_PATH: bin/Release/net8.0/publish
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 8.0.x
  WORKING_DIRECTORY: .
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
    - name: Restore
      run: dotnet restore "${{ env.WORKING_DIRECTORY }}"
    - name: Build
      run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore
    - name: Publish
      run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build
    - name: Copy .azurefunctions to publish output
      run: |
        PUBLISH_OUTPUT="${{ env.WORKING_DIRECTORY }}/${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
        if [ -d "${{ env.WORKING_DIRECTORY }}/bin/${{ env.CONFIGURATION }}/net8.0/.azurefunctions" ]; then
          cp -r "${{ env.WORKING_DIRECTORY }}/bin/${{ env.CONFIGURATION }}/net8.0/.azurefunctions" "$PUBLISH_OUTPUT/"
        elif [ -d "${{ env.WORKING_DIRECTORY }}/obj/${{ env.CONFIGURATION }}/net8.0/.azurefunctions" ]; then
          cp -r "${{ env.WORKING_DIRECTORY }}/obj/${{ env.CONFIGURATION }}/net8.0/.azurefunctions" "$PUBLISH_OUTPUT/"
        else
          echo "::warning::.azurefunctions not found in bin or obj; listing bin:"
          ls -la "${{ env.WORKING_DIRECTORY }}/bin/${{ env.CONFIGURATION }}/net8.0/" || true
        fi
    - name: Publish Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: functionapp
        path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        include-hidden-files: true
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: functionapp
        path: .
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.Kakeibo91081722_SPN }}
    - name: Deploy to Azure Function App
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: .
